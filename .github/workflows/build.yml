name: Build desktop artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist
          go build -o dist/trigen-linux-amd64 ./cmd/app
          tar -C dist -czf dist/trigen-linux-amd64.tar.gz trigen-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: trigen-linux-amd64
          path: dist/trigen-linux-amd64.tar.gz

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -o dist\TriGen-windows-amd64.exe ./cmd/app
          Compress-Archive -Path dist\TriGen-windows-amd64.exe -DestinationPath dist\TriGen-windows-amd64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: TriGen-windows-amd64
          path: dist/TriGen-windows-amd64.zip

  macos:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist
          go build -o dist/trigen-macos-arm64 ./cmd/app
          tar -C dist -czf dist/trigen-macos-arm64.tar.gz trigen-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: trigen-macos-arm64
          path: dist/trigen-macos-arm64.tar.gz

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-artifacts/**/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "TriGen desktop artifacts."
